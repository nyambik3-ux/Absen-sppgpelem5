<div class="min-h-screen bg-slate-900 text-slate-100 font-sans p-4 flex flex-col gap-4">

  <div class="bg-slate-800/50 border border-slate-700 p-4 rounded-3xl flex items-center gap-4 backdrop-blur-md">
    <div class="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center text-2xl font-bold shadow-lg shadow-blue-900/20">
      <img id="user-photo" src="https://via.placeholder.com/150" class="rounded-2xl hidden">
      <span id="initials">JD</span>
    </div>
    <div>
      <h1 class="font-bold text-lg leading-none">John Doe</h1>
      <p class="text-slate-400 text-xs mt-1 font-mono uppercase tracking-widest">Divisi Produksi</p>
    </div>
  </div>

  <div id="location-card" class="bg-emerald-500/10 border border-emerald-500/20 p-3 rounded-2xl flex items-center justify-between">
    <div class="flex items-center gap-2 text-emerald-400">
      <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
      <span class="text-xs font-bold uppercase">Area Pelem 5 Terdeteksi</span>
    </div>
    <span class="text-[10px] font-mono text-emerald-500">± 12 Meter</span>
  </div>

  <div class="flex-1 flex flex-col justify-center items-center gap-6 py-10">
    <div class="text-center">
      <div id="live-clock" class="text-5xl font-black tracking-tighter text-white">08:00:24</div>
      <p class="text-slate-500 text-xs font-medium uppercase tracking-widest mt-2">Rabu, 25 Maret 2026</p>
    </div>

    <button id="btn-absen" class="w-48 h-48 rounded-full bg-gradient-to-tr from-blue-700 to-blue-500 shadow-[0_0_50px_-12px_rgba(59,130,246,0.5)] border-8 border-slate-900 flex flex-col items-center justify-center group active:scale-95 transition-all">
      <span class="text-white font-black text-2xl tracking-tighter group-hover:scale-110 transition-transform">DATANG</span>
      <span class="text-blue-200 text-[10px] font-bold mt-1 uppercase tracking-widest">Klik Untuk Masuk</span>
    </button>
  </div>

  <div class="bg-slate-800/80 p-5 rounded-3xl border border-slate-700 shadow-xl">
    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-3">Monitoring Durasi</p>
    <div class="flex justify-between items-end">
      <div>
        <h3 class="text-2xl font-black text-white leading-none">0 Jam 0 Menit</h3>
        <p class="text-slate-400 text-[10px] mt-2 italic">*Target: 8 Jam Kerja Tepat Waktu</p>
      </div>
      <div class="text-right">
        <span class="block text-[10px] text-slate-500 font-bold uppercase">Masuk:</span>
        <span class="text-sm font-mono text-blue-400 font-bold">--:--</span>
      </div>
    </div>
  </div>

</div>
