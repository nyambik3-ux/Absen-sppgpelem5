<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPPG PELEM 5 - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .btn-primary { background: linear-gradient(90deg, #3b82f6 0%, #2563eb 100%); transition: all 0.2s; }
        .btn-primary:active { transform: scale(0.98); }
        input { transition: all 0.3s; }
        input:focus { border-color: #3b82f6 ! dominance; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="p-4 flex flex-col items-center">

    <div id="login-page" class="w-full max-w-md mt-10 p-8 glass">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-400">PELEM 5</h1>
            <p class="text-gray-400">Employee Portal</p>
        </div>
        <div class="space-y-4">
            <input type="text" id="user-id" placeholder="ID Karyawan (P5-xxx)" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 outline-none">
            <input type="password" id="user-pin" placeholder="PIN (4 Digit)" class="w-full p-4 bg-slate-800 rounded-xl border border-slate-700 outline-none">
            <button onclick="handleLogin()" id="login-btn" class="w-full p-4 btn-primary rounded-xl font-bold text-lg shadow-lg">MASUK SISTEM</button>
        </div>
    </div>

    <div id="main-page" class="w-full max-w-md hidden">
        <div class="glass p-6 mb-4 flex items-center justify-between">
            <div>
                <h2 id="display-name" class="text-xl font-bold text-white">...</h2>
                <p id="display-divisi" class="text-sm text-blue-300 italic">...</p>
            </div>
            <div id="user-avatar" class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-bold text-lg shadow-inner">P5</div>
        </div>

        <div class="glass p-6 mb-4 text-center">
            <p id="realtime-clock" class="text-3xl font-mono font-bold text-white mb-2">00:00:00</p>
            <p class="text-xs text-gray-400 uppercase tracking-widest">Waktu Presensi</p>
        </div>

        <div class="space-y-4">
            <button onclick="takeAbsen('DATANG')" class="w-full p-6 bg-emerald-600 rounded-2xl font-bold flex items-center justify-center gap-4 shadow-lg hover:bg-emerald-500">
                <i class="fas fa-sign-in-alt text-xl"></i> ABSEN DATANG
            </button>
            <button onclick="takeAbsen('PULANG')" class="w-full p-6 bg-orange-600 rounded-2xl font-bold flex items-center justify-center gap-4 shadow-lg hover:bg-orange-500">
                <i class="fas fa-sign-out-alt text-xl"></i> ABSEN PULANG
            </button>
        </div>
    </div>

    <script>
        // --- KONFIGURASI ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxQXV2c8JY3vKaO2FjC43zwQH69B5s_lk53EnynCBxytbC6qYciloq7v5k73h0UX3hf2Q/exec";
        let currentUser = null;

        // CLOCK SYSTEM
        setInterval(() => {
            const now = new Date();
            document.getElementById('realtime-clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
        }, 1000);

        // --- FUNGSI LOGIN ---
        async function handleLogin() {
            const idInput = document.getElementById('user-id').value.trim();
            const pinInput = document.getElementById('user-pin').value.trim();
            const btn = document.getElementById('login-btn');

            if (!idInput || !pinInput) {
                alert("Harap isi ID dan PIN!");
                return;
            }

            btn.innerText = "MEMVERIFIKASI...";
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    redirect: 'follow', // Penting untuk Google Script
                    body: JSON.stringify({ action: 'login', id: idInput, pin: pinInput }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const data = await response.json();

                if (data.result === 'success') {
                    currentUser = data.user;
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('main-page').classList.remove('hidden');
                    document.getElementById('display-name').innerText = currentUser.nama;
                    document.getElementById('display-divisi').innerText = currentUser.divisi;
                } else {
                    alert("⚠️ GAGAL: " + data.message);
                }
            } catch (error) {
                console.error("Login Error:", error);
                alert("Koneksi bermasalah. Pastikan internet aktif!");
            } finally {
                btn.innerText = "MASUK SISTEM";
                btn.disabled = false;
            }
        }

        // --- FUNGSI ABSEN ---
        async function takeAbsen(tipePresensi) {
            if (!currentUser) return;
            
            if (!confirm(`Konfirmasi Absen ${tipePresensi}?`)) return;

            navigator.geolocation.getCurrentPosition(async (position) => {
                const payload = {
                    action: 'absen',
                    id: currentUser.id,
                    nama: currentUser.nama,
                    tipe: tipePresensi,
                    lat: position.coords.latitude,
                    long: position.coords.longitude
                };

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        redirect: 'follow',
                        body: JSON.stringify(payload),
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                    });
                    const result = await res.json();
                    
                    if (result.result === 'success') {
                        alert(`✅ BERHASIL!\nStatus: ${result.status}\n${result.jamKerja ? 'Durasi: ' + result.jamKerja : ''}`);
                    } else {
                        alert(`❌ GAGAL: ${result.message}`);
                    }
                } catch (e) {
                    alert("Koneksi Error saat mengirim data presensi.");
                }
            }, (err) => {
                alert("⚠️ Gagal Presensi! GPS harus aktif dan diizinkan browser.");
            });
        }
    </script>
</body>
</html>
