<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Absensi Relawan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 36px;
            color: white;
        }
        h2 {
            color: white;
            font-size: 24px;
            margin-bottom: 6px;
        }
        .divisi {
            color: #a5b4fc;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .jam-info {
            background: rgba(0,0,0,0.4);
            border-radius: 32px;
            padding: 12px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            color: #cbd5e1;
            font-size: 14px;
        }
        .jam-info span {
            color: white;
            font-weight: bold;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 16px 0;
            border: none;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            background: #1e293b;
            color: #94a3b8;
        }
        button.active-masuk {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 8px 20px rgba(16,185,129,0.4);
        }
        button.active-pulang {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            box-shadow: 0 8px 20px rgba(249,115,22,0.4);
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .logout {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
            padding: 10px;
            font-size: 14px;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #0f172acc;
            backdrop-filter: blur(12px);
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            color: white;
            font-size: 14px;
            border-left: 4px solid #10b981;
            z-index: 999;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px);}
            to { opacity: 1; transform: translateY(0);}
        }
    </style>
</head>
<body>
<div class="card">
    <div class="avatar">👤</div>
    <h2 id="namaUser">Memuat...</h2>
    <div class="divisi" id="divisiUser">-</div>
    <div class="jam-info">
        <div>⏰ Jam Masuk</div>
        <div><span id="jamMasukTarget">--:--</span></div>
        <div>🏁 Jam Pulang</div>
        <div><span id="jamPulangTarget">--:--</span></div>
    </div>
    <div class="btn-group">
        <button id="btnMasuk">📥 MASUK</button>
        <button id="btnPulang" disabled>📤 PULANG</button>
    </div>
    <button id="logoutBtn" class="logout">🚪 Keluar</button>
</div>

<script>
    // ========== KONFIGURASI ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZZg3ddy394sAI24km9hE1kI8rconMG0XJicU1pwyJNGElrOhs1GX-0B8hX2MpKhiJ6g/exec";
    
    // ========== AMBIL DATA LOGIN ==========
    let user = null;
    try {
        const raw = sessionStorage.getItem('user_pelem_5');
        if (!raw) throw new Error();
        user = JSON.parse(raw);
    } catch(e) {
        window.location.href = "login.html";
    }

    // Tampilkan profil
    document.getElementById('namaUser').innerText = user.nama || user.id;
    document.getElementById('divisiUser').innerText = user.divisi || "Relawan";
    document.getElementById('jamMasukTarget').innerText = user.jamMasuk || "08:00";
    document.getElementById('jamPulangTarget').innerText = user.jamPulang || "17:00";

    // ========== STATE ABSEN (per hari, disimpan di sessionStorage) ==========
    function getTodayKey() {
        const d = new Date();
        return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }
    const tiketKey = `absen_${user.id}_${getTodayKey()}`;
    let sudahMasuk = sessionStorage.getItem(tiketKey) === 'masuk';
    let sudahPulang = sessionStorage.getItem(tiketKey) === 'pulang';

    const btnMasuk = document.getElementById('btnMasuk');
    const btnPulang = document.getElementById('btnPulang');

    function updateButtonState() {
        if (sudahPulang) {
            btnMasuk.disabled = true;
            btnPulang.disabled = true;
            btnMasuk.classList.remove('active-masuk');
            btnPulang.classList.remove('active-pulang');
            return;
        }
        if (sudahMasuk) {
            btnMasuk.disabled = true;
            btnMasuk.classList.remove('active-masuk');
            btnPulang.disabled = false;
            btnPulang.classList.add('active-pulang');
        } else {
            btnMasuk.disabled = false;
            btnMasuk.classList.add('active-masuk');
            btnPulang.disabled = true;
            btnPulang.classList.remove('active-pulang');
        }
    }
    updateButtonState();

    // ========== FUNGSI PANGGIL BACKEND ==========
    async function callAbsen(action) {
        // Nonaktifkan tombol sementara
        btnMasuk.disabled = true;
        btnPulang.disabled = true;
        
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: action,   // "DATANG" atau "PULANG"
                    id: user.id,
                    nama: user.nama || user.id,
                    lat: 0, lng: 0    // opsional, dikirim saja 0
                })
            });
            const data = await res.json();
            if (data.result === "success") {
                if (action === "DATANG") {
                    sessionStorage.setItem(tiketKey, 'masuk');
                    sudahMasuk = true;
                    showToast("✅ Absen Masuk berhasil!");
                } else if (action === "PULANG") {
                    sessionStorage.setItem(tiketKey, 'pulang');
                    sudahPulang = true;
                    showToast("✅ Absen Pulang berhasil!");
                }
                updateButtonState();
                // Jika sudah pulang, reload agar state tetap (opsional)
                if (sudahPulang) {
                    setTimeout(() => window.location.reload(), 1200);
                }
            } else {
                showToast("❌ Gagal: " + (data.message || "Terjadi kesalahan"), true);
                // Kembalikan state tombol
                updateButtonState();
            }
        } catch (err) {
            console.error(err);
            showToast("❌ Error jaringan, coba lagi", true);
            updateButtonState();
        }
    }

    // Event listener tombol
    btnMasuk.addEventListener('click', () => callAbsen("DATANG"));
    btnPulang.addEventListener('click', () => callAbsen("PULANG"));
    document.getElementById('logoutBtn').addEventListener('click', () => {
        sessionStorage.removeItem('user_pelem_5');
        // Hapus juga tiket hari ini agar tidak menggantung
        sessionStorage.removeItem(tiketKey);
        window.location.href = "login.html";
    });

    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#f97316' : '#10b981';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
</script>
</body>
</html>
