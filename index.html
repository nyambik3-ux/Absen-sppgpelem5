<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelem 5 Monitoring</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: #04091A; color: white; display: flex; justify-content: center; min-height: 100vh; padding: 30px 0; }
        .app { width: 90%; max-width: 400px; text-align: center; }

        /* Clock & Date */
        #clock { font-size: 50px; font-weight: bold; margin-bottom: 5px; }
        #date { font-size: 12px; color: #848999; background: #12182B; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 40px; text-transform: uppercase; }

        /* Main Absen Button (Circle) */
        .circle-btn { width: 180px; height: 180px; border-radius: 50%; background: #1565C0; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 40px; cursor: pointer; box-shadow: 0 0 30px rgba(21, 101, 192, 0.5); border: none; transition: 0.3s; color: white; }
        .circle-btn:disabled { background: #333; box-shadow: none; cursor: not-allowed; }
        .circle-btn:active:not(:disabled) { transform: scale(0.95); }
        .circle-btn h1 { font-size: 32px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }
        .circle-btn p { font-size: 11px; color: #BBDEFB; }

        /* Monitoring Card */
        .card { background: #0A1124; border-radius: 20px; padding: 25px; text-align: left; border: 1px solid #1A2238; margin-bottom: 20px; }
        .card-header { font-size: 11px; color: #848999; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; font-weight: bold; }
        
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stat-main { font-size: 28px; font-weight: bold; }
        .stat-sub { font-size: 11px; color: #848999; font-style: italic; }
        
        .status-pill { background: #12182B; padding: 10px 20px; border-radius: 10px; text-align: center; border: 1px solid #1A2238; }
        .status-pill span { font-size: 10px; color: #848999; display: block; margin-bottom: 2px; }
        .status-pill b { font-size: 14px; color: #2196F3; text-transform: uppercase; }

        /* Target Time Rows */
        .target-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #1A2238; font-size: 13px; }
        .target-label { color: #848999; }
        .target-time { font-weight: bold; color: white; }

        /* Loader */
        .loader { display: none; width: 25px; height: 25px; border: 3px solid #ffffff33; border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app">
    <div id="clock">00:00:00</div>
    <div id="date">MEMUAT...</div>

    <button id="btn-absen" class="circle-btn" onclick="doAbsen()" disabled>
        <div id="loader" class="loader"></div>
        <div id="btn-content">
            <h1 id="txt-action">DATANG</h1>
            <p>KLIK UNTUK ABSEN</p>
        </div>
    </button>

    <div class="card">
        <div class="card-header">PELEM 5 MONITORING</div>
        
        <div class="stat-row">
            <div>
                <div class="stat-main" id="u-akumulasi">0 Hari</div>
                <div class="stat-sub">*Total Masuk (14 Hari Terakhir)</div>
            </div>
            <div class="status-pill">
                <span>STATUS:</span>
                <b id="u-status-hari-ini">NORMAL</b>
            </div>
        </div>

        <div class="target-row" style="margin-top: 20px;">
            <span class="target-label">Target Masuk</span>
            <span class="target-time" id="t-m">--:--</span>
        </div>
        <div class="target-row">
            <span class="target-label">Target Pulang</span>
            <span class="target-time" id="t-p">--:--</span>
        </div>
    </div>
</div>

<script>
    // --- CONFIG LU (JANGAN DIUBAH, DAH BENER) ---
    const scriptURL = "https://script.google.com/macros/s/AKfycbzrrQ510rB9niFNcs9_8eucQXIRVgJU9lsUOp_BgTaFoOs_Vr55XkVThndWb5qD9cRS/exec"; 
    const KANTOR = { lat: -7.86765090281387, lng: 112.01944788836946, rad: 150 }; 
    
    let user = JSON.parse(localStorage.getItem('user_pelem_5'));
    let statusHarian = "DATANG";

    // --- REALTIME CLOCK ---
    function updateClock() {
        const now = new Date();
        const j = now.getHours().toString().padStart(2, '0');
        const m = now.getMinutes().toString().padStart(2, '0');
        const s = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('clock').innerText = `${j}.${m}.${s}`;
        
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', options);
    }
    setInterval(updateClock, 1000);
    updateClock();

    // --- ONLOAD: CEK LOGIN & SYNC ---
    window.onload = async () => {
        if(!user) return window.location.href = "login.html";
        
        // Isi Target Jam (Fitur Baru)
        document.getElementById('t-m').innerText = user.jamMasuk || "--:--";
        document.getElementById('t-p').innerText = user.jamPulang || "--:--";
        
        await syncStatus();
    };

    // --- SYNC STATUS KE GAS ---
    async function syncStatus() {
        try {
            const r = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "login", id: user.id, pin: "RECHECK" })});
            const d = await r.json();
            statusHarian = d.statusHariIni;
            document.getElementById('u-akumulasi').innerText = `${d.totalAkumulasi || 0} Hari`;
            updateUI();
        } catch (e) { document.getElementById('u-status-hari-ini').innerText = "OFFLINE"; }
    }

    // --- UPDATE UI SEUAI STATUS (DARK MODE STYLE) ---
    function updateUI() {
        const btn = document.getElementById('btn-absen');
        const txt = document.getElementById('txt-action');
        const statusPill = document.getElementById('u-status-hari-ini');
        
        btn.disabled = false;
        
        if(statusHarian === "SELESAI"){
            btn.disabled = true;
            txt.innerText = "DONE";
            btn.style.background = "#333";
            btn.style.boxShadow = "none";
            statusPill.innerText = "BERES ✓"; statusPill.style.color = "#848999";
        } else if(statusHarian === "PULANG"){
            txt.innerText = "PULANG";
            btn.style.background = "#F57C00"; // Orange
            btn.style.boxShadow = "0 0 30px rgba(245, 124, 0, 0.5)";
            statusPill.innerText = "SDH MASUK"; statusPill.style.color = "#F57C00";
        } else {
            txt.innerText = "DATANG";
            btn.style.background = "#1565C0"; // Blue
            btn.style.boxShadow = "0 0 30px rgba(21, 101, 192, 0.5)";
            statusPill.innerText = "NORMAL"; statusPill.style.color = "#2196F3";
        }
    }

    // --- EKSEKUSI ABSEN + GEOLOCATION ---
    function doAbsen() {
        setLoading(true);
        navigator.geolocation.getCurrentPosition(async (p) => {
            const d = dist(p.coords.latitude, p.coords.longitude, KANTOR.lat, KANTOR.lng);
            
            // Cek Radius
            if(d > KANTOR.rad) { 
                alert(`🚨 KEJAUHAN, BRO!\nJarak lu: ${Math.round(d)}m. Max: 150m.`); 
                setLoading(false); return; 
            }

            try {
                const r = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: statusHarian, id: user.id, nama: user.nama, lat: p.coords.latitude, lng: p.coords.longitude })});
                const res = await r.json();
                
                if(res.result === "success") {
                    const jamNow = new Date().getHours().toString().padStart(2,'0') + ":" + new Date().getMinutes().toString().padStart(2,'0');
                    
                    // Notif Telat (Fitur Baru)
                    if(statusHarian === "DATANG" && jamNow > user.jamMasuk) {
                        alert(`⚠️ TELAT LU!\nTarget: ${user.jamMasuk}\nAbsen: ${jamNow}`);
                    } else {
                        alert("✅ ABSEN BERHASIL!");
                    }
                    location.reload();
                }
            } catch(e) { alert("Error Server!"); setLoading(false); }
        }, (e) => { alert("GPS Mati/Ditolak!"); setLoading(false); }, { enableHighAccuracy: true });
    }

    // --- UTILITIES ---
    function setLoading(s) {
        document.getElementById('loader').style.display = s ? "block" : "none";
        document.getElementById('btn-content').style.display = s ? "none" : "block";
        document.getElementById('btn-absen').disabled = s;
    }

    function dist(l1, n1, l2, n2) {
        const R = 6371e3; const dL = (l2-l1)*Math.PI/180; const dN = (n2-n1)*Math.PI/180;
        const a = Math.sin(dL/2)*Math.sin(dL/2) + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
</script>

</body>
</html>
