<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelem 5 Absensi</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    <meta name="application-name" content="Pelem 5">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #0f172a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; }
        .btn-grad { background: linear-gradient(135deg, #3b82f6, #1d4ed8); transition: 0.2s; }
        .btn-grad:active { transform: scale(0.95); }
        #avatar-container { background-position: center; background-size: cover; border: 2px solid rgba(255,255,255,0.1); }
        input:focus { border-color: #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }
    </style>
</head>
<body>

    <div id="login-page" class="glass p-10 w-full max-w-sm text-center shadow-2xl">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-500/20">
            <i class="fas fa-fingerprint text-4xl"></i>
        </div>
        <h1 class="text-2xl font-black mb-1">PELEM 5</h1>
        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-8">Attendance System</p>
        
        <div class="space-y-4">
            <<input type="text" id="user-id" placeholder="ID Karyawan" class="w-full bg-slate-900/50 p-4 rounded-xl outline-none border border-white/5 text-white text-center font-bold">
            <input type="password" id="user-pin" placeholder="PIN" class="w-full bg-slate-900/50 p-4 rounded-xl outline-none border border-white/5 text-white text-center font-bold tracking-widest">
            <button onclick="handleLogin()" id="btn-login" class="btn-grad w-full py-4 rounded-xl font-extrabold uppercase tracking-widest shadow-xl">Masuk</button>
        </div>
    </div>

    <div id="main-page" class="hidden w-full max-w-md space-y-4 animate-in fade-in duration-500">
        <div class="glass p-5 flex items-center gap-4 border-l-4 border-blue-500">
            <div id="avatar-container" class="relative w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center text-2xl font-black overflow-hidden shadow-inner">
                <span id="avatar-txt">--</span>
                <label class="absolute inset-0 bg-black/40 flex items-center justify-center cursor-pointer opacity-0 hover:opacity-100 transition-all">
                    <i class="fas fa-camera text-white text-sm"></i>
                    <input type="file" id="input-foto" class="hidden" accept="image/*" onchange="prosesDanUpload(this)">
                </label>
            </div>
            <div class="flex-1">
                <h2 id="display-name" class="text-lg font-bold leading-tight">...</h2>
                <p id="display-divisi" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">...</p>
                <div class="mt-1 inline-block px-2 py-0.5 bg-blue-500/10 text-blue-400 text-[9px] font-black rounded border border-blue-500/20">SHIFT: 08:00 - 16:00</div>
            </div>
        </div>

        <div class="glass p-6 text-center shadow-lg">
            <div id="clock" class="text-5xl font-black tracking-tighter text-white mb-1">00:00:00</div>
            <div id="dist-info" class="text-[10px] font-bold tracking-[0.2em] text-slate-500 uppercase italic italic">Mendeteksi Lokasi...</div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="glass p-3 text-center">
                <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Hadir</p>
                <p id="rekap-hadir" class="text-lg font-black text-blue-400">0</p>
            </div>
            <div class="glass p-3 text-center">
                <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Telat</p>
                <p id="rekap-telat" class="text-lg font-black text-orange-500">0</p>
            </div>
            <div class="glass p-3 text-center">
                <p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Jam</p>
                <p id="rekap-durasi" class="text-lg font-black text-white">0h</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="takeAbsen('DATANG')" class="bg-emerald-600 p-5 rounded-[24px] font-black flex flex-col items-center gap-2 active:scale-95 transition-all shadow-xl shadow-emerald-900/20">
                <i class="fas fa-sign-in-alt text-xl"></i><span class="text-xs">MASUK</span>
            </button>
            <button onclick="takeAbsen('PULANG')" class="bg-rose-600 p-5 rounded-[24px] font-black flex flex-col items-center gap-2 active:scale-95 transition-all shadow-xl shadow-rose-900/20">
                <i class="fas fa-sign-out-alt text-xl"></i><span class="text-xs">PULANG</span>
            </button>
        </div>
        
        <button onclick="location.reload()" class="w-full py-4 text-[9px] text-slate-600 font-bold uppercase tracking-[0.5em] mt-4">Keluar Aplikasi</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyqHpwpLLp93_sxcwvWuwksNmlWSlTBZqmMxFJalBQqkJ1ggaKJGxl6WDhSvuBIXSSG2g/exec";
        const IMGBB_KEY = "db424c7743b9662f9bbbe42979c8e23a";
        let user = null;

        // 1. CLOCK & GPS ENGINE
        setInterval(() => {
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false});
            
            navigator.geolocation.getCurrentPosition(p => {
                const dist = calculateDistance(p.coords.latitude, p.coords.longitude, -7.749941, 112.174396);
                const info = document.getElementById('dist-info');
                if(info) {
                    info.innerText = `Jarak: ${Math.round(dist)}m dari Kediri`;
                    info.className = dist > 100 ? "text-[10px] text-rose-500 font-bold animate-pulse" : "text-[10px] text-emerald-500 font-bold";
                }
            }, null, {enableHighAccuracy:true});
        }, 1000);

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 2. LOGIN ENGINE
        async function handleLogin() {
            const id = document.getElementById('user-id').value;
            const pin = document.getElementById('user-pin').value;
            const btn = document.getElementById('btn-login');
            if(!id || !pin) return alert("ID & PIN Wajib Diisi!");

            btn.innerText = "Verifikasi..."; btn.disabled = true;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", id: id, pin: pin }) });
                const d = await res.json();
                if(d.result === 'success') {
                    user = d.user;
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('main-page').classList.remove('hidden');
                    document.getElementById('display-name').innerText = user.nama;
                    document.getElementById('display-divisi').innerText = user.divisi;
                    updateAvatarUi(user.foto, user.nama);
                    document.getElementById('rekap-hadir').innerText = d.rekap.hadir;
                    document.getElementById('rekap-telat').innerText = d.rekap.telat;
                    document.getElementById('rekap-durasi').innerText = d.rekap.jam + "h";
                } else { alert(d.message); }
            } catch(e) { alert("Gagal koneksi ke server!"); }
            finally { btn.innerText = "Masuk"; btn.disabled = false; }
        }

        function updateAvatarUi(url, nama) {
            const box = document.getElementById('avatar-container');
            const txt = document.getElementById('avatar-txt');
            if(url) { box.style.backgroundImage = `url('${url}')`; txt.innerText = ""; }
            else { box.style.backgroundImage = "none"; txt.innerText = nama.substring(0,2).toUpperCase(); }
        }

        // 3. TURBO RESIZE & UPLOAD
        async function prosesDanUpload(input) {
            if (!input.files[0]) return;
            const txt = document.getElementById('avatar-txt');
            const oldContent = txt.innerHTML;
            txt.innerHTML = '<i class="fas fa-spinner fa-spin text-sm"></i>';

            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 500; 
                    let w = img.width, h = img.height;
                    if (w > h) { if(w > MAX){ h *= MAX/w; w = MAX; } }
                    else { if(h > MAX){ w *= MAX/h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    canvas.toBlob(async (blob) => {
                        const form = new FormData();
                        form.append("image", blob);
                        try {
                            const ri = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: form });
                            const di = await ri.json();
                            const url = di.data.url;
                            const rg = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "update_foto", id: user.id, fotoUrl: url }) });
                            const dg = await rg.json();
                            if(dg.result === 'success') { updateAvatarUi(url, user.nama); alert("Foto Berhasil!"); }
                        } catch(e) { alert("Gagal upload!"); }
                        finally { txt.innerHTML = oldContent; }
                    }, 'image/jpeg', 0.6); 
                };
            };
        }

        // 4. ABSEN ENGINE
        async function takeAbsen(tipe) {
            navigator.geolocation.getCurrentPosition(async p => {
                try {
                    const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: tipe, id: user.id, nama: user.nama, lat: p.coords.latitude, lng: p.coords.longitude }) });
                    const d = await r.json();
                    alert(d.message);
                    if(d.result === 'success') location.reload();
                } catch(e) { alert("Gagal kirim absen!"); }
            }, () => alert("GPS Wajib Aktif!"));
        }
    </script>
</body>
</html>
