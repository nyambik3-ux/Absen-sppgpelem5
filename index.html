<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelem 5 Attendance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #0f172a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin:0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; }
        #avatar-container { background-position: center; background-size: cover; background-repeat: no-repeat; border: 2px solid rgba(255,255,255,0.1); }
        .btn-grad { background: linear-gradient(135deg, #3b82f6, #1d4ed8); }
        .btn-grad:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div id="login-page" class="glass p-10 w-full max-w-sm text-center shadow-2xl">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-xl shadow-blue-500/20">
            <i class="fas fa-fingerprint text-4xl"></i>
        </div>
        <h1 class="text-2xl font-black mb-1">PELEM 5</h1>
        <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mb-8">Attendance System</p>
        <div class="space-y-4">
            <input type="text" id="user-id" placeholder="ID KARYAWAN" class="w-full bg-slate-900/50 p-4 rounded-xl outline-none border border-white/5 text-white text-center font-bold">
            <input type="password" id="user-pin" placeholder="PIN" class="w-full bg-slate-900/50 p-4 rounded-xl outline-none border border-white/5 text-white text-center font-bold tracking-widest">
            <button onclick="handleLogin()" id="btn-login" class="btn-grad w-full py-4 rounded-xl font-extrabold uppercase tracking-widest shadow-xl">Masuk</button>
        </div>
    </div>

    <div id="main-page" class="hidden w-full max-w-md space-y-4">
        <div class="glass p-5 flex items-center gap-4">
            <div id="avatar-container" class="relative w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center text-2xl font-black overflow-hidden shadow-inner">
                <span id="avatar-txt">--</span>
                <label class="absolute inset-0 bg-black/40 flex items-center justify-center cursor-pointer opacity-0 hover:opacity-100 transition-all">
                    <i class="fas fa-camera text-white text-sm"></i>
                    <input type="file" id="input-foto" class="hidden" accept="image/*" onchange="prosesDanUpload(this)">
                </label>
            </div>
            <div class="flex-1">
                <h2 id="display-name" class="text-lg font-bold leading-tight">...</h2>
                <p id="display-divisi" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider italic">Mendeteksi...</p>
            </div>
        </div>

        <div class="glass p-6 text-center">
            <div id="clock" class="text-5xl font-black tracking-tighter text-white mb-1">00:00:00</div>
            <div id="dist-info" class="text-[10px] font-bold tracking-[0.2em] text-slate-500 uppercase">GPS Loading...</div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <div class="glass p-3 text-center"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Hadir</p><p id="rekap-hadir" class="text-lg font-black text-blue-400">0</p></div>
            <div class="glass p-3 text-center"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Telat</p><p id="rekap-telat" class="text-lg font-black text-orange-500">0</p></div>
            <div class="glass p-3 text-center"><p class="text-[8px] text-slate-500 font-bold uppercase mb-1">Jam</p><p id="rekap-durasi" class="text-lg font-black text-white">0h</p></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="takeAbsen('DATANG')" class="bg-emerald-600 p-5 rounded-[24px] font-black flex flex-col items-center gap-2 active:scale-95 transition-all">
                <i class="fas fa-sign-in-alt text-xl"></i><span class="text-xs font-bold">ABSEN MASUK</span>
            </button>
            <button onclick="takeAbsen('PULANG')" class="bg-rose-600 p-5 rounded-[24px] font-black flex flex-col items-center gap-2 active:scale-95 transition-all">
                <i class="fas fa-sign-out-alt text-xl"></i><span class="text-xs font-bold">ABSEN PULANG</span>
            </button>
        </div>
        
        <button onclick="location.reload()" class="w-full py-4 text-[9px] text-slate-600 font-bold uppercase tracking-[0.5em] mt-4 font-bold">Keluar Aplikasi</button>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzegpCrLDivHp62FcPAOTA-qHtNN2OL5zKnfeaJ-_kFjjNfHcrtqTfbNhaZpPrikFSlnw/exec";
        let user = null;

        // 1. CLOCK & GPS ENGINE
        setInterval(() => {
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false});
            
            navigator.geolocation.getCurrentPosition(p => {
                const dist = calculateDistance(p.coords.latitude, p.coords.longitude, -7.749941, 112.174396);
                const info = document.getElementById('dist-info');
                if(info) {
                    info.innerText = `Jarak: ${Math.round(dist)}m dari Kediri`;
                    info.className = dist > 100 ? "text-[10px] text-rose-500 font-black animate-pulse uppercase" : "text-[10px] text-emerald-500 font-black uppercase";
                }
            }, null, {enableHighAccuracy:true});
        }, 1000);

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // 2. LOGIN ENGINE
        async function handleLogin() {
            const id = document.getElementById('user-id').value;
            const pin = document.getElementById('user-pin').value;
            const btn = document.getElementById('btn-login');
            if(!id || !pin) return alert("ID & PIN Wajib Diisi!");

            btn.innerText = "Verifikasi..."; btn.disabled = true;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "login", id: id, pin: pin }) });
                const d = await res.json();
                if(d.result === 'success') {
                    user = d.user;
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('main-page').classList.remove('hidden');
                    document.getElementById('display-name').innerText = user.nama;
                    document.getElementById('display-divisi').innerText = user.divisi;
                    updateAvatarUi(user.foto, user.nama);
                    document.getElementById('rekap-hadir').innerText = d.rekap.hadir;
                    document.getElementById('rekap-telat').innerText = d.rekap.telat;
                    document.getElementById('rekap-durasi').innerText = d.rekap.jam + "h";
                } else { alert(d.message); }
            } catch(e) { alert("Gagal koneksi! Pastikan Apps Script sudah di-Deploy!"); }
            finally { btn.innerText = "Masuk"; btn.disabled = false; }
        }

        function updateAvatarUi(url, nama) {
            const box = document.getElementById('avatar-container');
            const txt = document.getElementById('avatar-txt');
            if(url && url !== "") { 
                box.style.backgroundImage = `url('${url}')`; 
                txt.innerText = ""; 
            } else { 
                box.style.backgroundImage = "none"; 
                txt.innerText = nama ? nama.substring(0,2).toUpperCase() : "--"; 
            }
        }

        // 3. DRIVE UPLOAD ENGINE (ANTI-BLOKIR)
        async function prosesDanUpload(input) {
            if (!input.files[0] || !user) return;
            const txt = document.getElementById('avatar-txt');
            const oldHtml = txt.innerHTML;
            txt.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 500;
                    let w = img.width, h = img.height;
                    if (w > h) { if(w > MAX){ h *= MAX/w; w = MAX; } }
                    else { if(h > MAX){ w *= MAX/h; h = MAX; } }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    
                    const base64Data = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

                    try {
                        const res = await fetch(API_URL, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: "update_foto_drive",
                                id: user.id,
                                base64Data: base64Data
                            })
                        });
                        const d = await res.json();
                        if(d.result === 'success') {
                            updateAvatarUi(d.url, user.nama);
                            alert("Foto Tersimpan di Google Drive!");
                        }
                    } catch(err) {
                        alert("Gagal Kirim ke Drive!");
                    } finally {
                        txt.innerHTML = oldHtml;
                    }
                };
            };
        }

        // 4. ABSEN ENGINE
        async function takeAbsen(tipe) {
            navigator.geolocation.getCurrentPosition(async p => {
                try {
                    const r = await fetch(API_URL, { 
                        method: 'POST', 
                        body: JSON.stringify({ 
                            action: tipe, id: user.id, nama: user.nama, 
                            lat: p.coords.latitude, lng: p.coords.longitude 
                        }) 
                    });
                    const d = await r.json();
                    alert(d.message);
                    if(d.result === 'success') location.reload();
                } catch(e) { alert("Gagal kirim absen!"); }
            }, () => alert("GPS Wajib Aktif!"));
        }
    </script>
</body>
</html>
