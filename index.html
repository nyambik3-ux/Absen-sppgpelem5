<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Absensi Relawan • Smart Presence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .glass-card {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 25, 45, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 32px 24px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.08);
            transition: all 0.3s;
        }
        .profile {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 28px;
        }
        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #a855f7, #3b82f6);
            border-radius: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
        }
        .avatar img {
            width: 70px;
            height: 70px;
            border-radius: 35px;
            object-fit: cover;
        }
        .info h2 {
            font-size: 22px;
            font-weight: 700;
            color: white;
            letter-spacing: -0.3px;
        }
        .info p {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
            font-weight: 500;
        }
        .time-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 36px;
            padding: 24px 20px;
            text-align: center;
            margin-bottom: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .clock {
            font-size: 56px;
            font-weight: 800;
            font-family: monospace;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0f9ff, #c7d2fe);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        .date {
            font-size: 14px;
            color: #94a3b8;
            margin-top: 10px;
            font-weight: 500;
        }
        .schedule {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.04);
            padding: 16px 20px;
            border-radius: 32px;
            margin-bottom: 32px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .schedule div {
            color: #cbd5e1;
        }
        .schedule span {
            color: #ffffff;
            font-weight: 700;
            margin-left: 6px;
        }
        .btn-group {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        button {
            flex: 1;
            padding: 18px 0;
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 800;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.06);
            color: #64748b;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        button.active-masuk {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }
        button.active-pulang {
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(249, 115, 22, 0.4);
        }
        button:active {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
            filter: grayscale(0.2);
            box-shadow: none;
        }
        .logout-btn {
            width: 100%;
            background: rgba(220, 38, 38, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(220, 38, 38, 0.3);
            box-shadow: none;
            font-size: 15px;
            font-weight: 600;
            padding: 14px;
        }
        .logout-btn:hover {
            background: rgba(220, 38, 38, 0.2);
            color: #ef4444;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            background: #0f172ae6;
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            text-align: center;
            z-index: 1000;
            animation: slideUp 0.3s ease;
            max-width: 440px;
            margin: 0 auto;
            border-left: 5px solid #059669;
            pointer-events: none;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @media (max-width: 480px) {
            .glass-card { padding: 26px 18px; }
            .clock { font-size: 44px; }
            .btn-group { gap: 12px; }
            button { font-size: 14px; padding: 14px 0; }
        }
    </style>
</head>
<body>
<div class="glass-card">
    <div class="profile">
        <div class="avatar" id="avatar">
            <span>👤</span>
        </div>
        <div class="info">
            <h2 id="namaUser">Memuat...</h2>
            <p id="divisiUser">-</p>
        </div>
    </div>

    <div class="time-panel">
        <div class="clock" id="jamDigital">--:--:--</div>
        <div class="date" id="tanggal">--</div>
    </div>

    <div class="schedule">
        <div>🕘 MASUK <span id="jamMasukTarget">--:--</span></div>
        <div>🏁 PULANG <span id="jamPulangTarget">--:--</span></div>
    </div>

    <div class="btn-group">
        <button id="btnMasuk" class="active-masuk">
            <span>📥</span> MASUK
        </button>
        <button id="btnPulang" disabled>
            <span>📤</span> PULANG
        </button>
    </div>
    
    <button id="logoutBtn" class="logout-btn">
        🚪 KELUAR
    </button>
</div>

<script>
    // ========== KONFIGURASI ENDPOINT ==========
    // Pastikan URL di bawah sama dengan URL pada file login.html dan Google Apps Script
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzz2FeIDnbZd57baKXlt60x_KKMFzx6vlfs6Ibk5e-6wQYytUneshC0ecxAnMut0uyS9Q/exec";

    // ========== AMBIL DATA DARI LOCAL STORAGE ==========
    let user = null;
    try {
        const raw = localStorage.getItem('user_pelem_5');
        if (!raw) throw new Error();
        user = JSON.parse(raw);
    } catch(e) {
        window.location.href = "login.html";
    }

    // ========== FUNGSI FORMAT WAKTU MENCEGAH TAHUN 1899 ==========
    function formatTime(val) {
        if (!val) return "--:--";
        if (typeof val === 'string' && val.includes('T')) {
            const date = new Date(val);
            const h = date.getUTCHours().toString().padStart(2, '0');
            const m = date.getUTCMinutes().toString().padStart(2, '0');
            return `${h}:${m}`;
        }
        return val;
    }

    document.getElementById('namaUser').innerText = user.nama || user.id;
    document.getElementById('divisiUser').innerText = user.divisi || "Relawan";
    document.getElementById('jamMasukTarget').innerText = formatTime(user.jamMasuk);
    document.getElementById('jamPulangTarget').innerText = formatTime(user.jamPulang);

    if (user.foto && user.foto !== "" && user.foto !== "https://via.placeholder.com/150") {
        const avatarDiv = document.getElementById('avatar');
        avatarDiv.innerHTML = `<img src="${user.foto}" alt="Foto Profil">`;
    }

    // ========== STATE & STATUS ABSENSI HARI INI ==========
    function getTodayKey() {
        const d = new Date();
        const y = d.getFullYear();
        const m = (d.getMonth() + 1).toString().padStart(2, '0');
        const day = d.getDate().toString().padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    const STORAGE_KEY = `absen_${user.id}_${getTodayKey()}`;
    let sudahMasuk = user.hasCheckedIn || localStorage.getItem(STORAGE_KEY) === 'masuk';
    let sudahPulang = user.hasCheckedOut || localStorage.getItem(STORAGE_KEY) === 'pulang';

    const btnMasuk = document.getElementById('btnMasuk');
    const btnPulang = document.getElementById('btnPulang');

    function updateButtonState() {
        if (sudahPulang) {
            btnMasuk.disabled = true;
            btnPulang.disabled = true;
            btnMasuk.classList.remove('active-masuk');
            btnPulang.classList.remove('active-pulang');
            return;
        }
        if (sudahMasuk) {
            btnMasuk.disabled = true;
            btnMasuk.classList.remove('active-masuk');
            btnPulang.disabled = false;
            btnPulang.classList.add('active-pulang');
        } else {
            btnMasuk.disabled = false;
            btnMasuk.classList.add('active-masuk');
            btnPulang.disabled = true;
            btnPulang.classList.remove('active-pulang');
        }
    }
    updateButtonState();

    // ========== FUNGSI ABSEN DENGAN GEOLOCATION ==========
    async function doAbsen(action) {
        btnMasuk.disabled = true;
        btnPulang.disabled = true;

        let lat = 0;
        let lng = 0;

        try {
            const position = await new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject);
            });
            lat = position.coords.latitude;
            lng = position.coords.longitude;
        } catch (err) {
            console.warn("Gagal mendapatkan lokasi atau izin ditolak. Menggunakan koordinat default.");
        }

        try {
            // Pengiriman dilakukan tanpa header JSON tambahan untuk menghindari preflight (CORS)
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: action,
                    id: user.id,
                    nama: user.nama || user.id,
                    lat: lat,
                    lng: lng
                })
            });
            const data = await response.json();

            if (data.result === "success") {
                if (action === "DATANG") {
                    localStorage.setItem(STORAGE_KEY, 'masuk');
                    sudahMasuk = true;
                    showToast("✅ Absen Masuk berhasil!");
                } else if (action === "PULANG") {
                    localStorage.setItem(STORAGE_KEY, 'pulang');
                    sudahPulang = true;
                    showToast("✅ Absen Pulang berhasil!");
                }
                updateButtonState();
                if (sudahPulang) {
                    setTimeout(() => window.location.reload(), 1500);
                }
            } else {
                showToast("❌ Gagal: " + (data.message || "Silakan coba lagi"), true);
                updateButtonState();
            }
        } catch (err) {
            console.error(err);
            showToast("❌ Gagal koneksi ke server!", true);
            updateButtonState();
        }
    }

    // ========== EVENT LISTENER ==========
    btnMasuk.addEventListener('click', () => doAbsen("DATANG"));
    btnPulang.addEventListener('click', () => doAbsen("PULANG"));

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('user_pelem_5');
        localStorage.removeItem(STORAGE_KEY);
        window.location.href = "login.html";
    });

    // ========== JAM DIGITAL & TANGGAL ==========
    function updateClock() {
        const now = new Date();
        const jam = now.getHours().toString().padStart(2, '0');
        const menit = now.getMinutes().toString().padStart(2, '0');
        const detik = now.getSeconds().toString().padStart(2, '0');
        document.getElementById('jamDigital').innerText = `${jam}:${menit}:${detik}`;

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('tanggal').innerText = now.toLocaleDateString('id-ID', options);
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ========== TOAST NOTIFICATION ==========
    function showToast(msg, isError = false) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.style.borderLeftColor = isError ? '#ea580c' : '#059669';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2600);
    }
</script>
</body>
</html>
