<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pelem 5 Monitoring</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #04091A; color: white; display: flex; justify-content: center; min-height: 100vh; padding: 20px 0; }
        .app { width: 90%; max-width: 400px; text-align: center; position: relative; }

        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 30px; position: relative; z-index: 50; }
        .profile-dropdown { display: flex; align-items: center; background: #0A1124; border: 1px solid #1A2238; border-radius: 15px; padding: 8px 15px; cursor: pointer; transition: 0.2s; user-select: none; }
        .profile-dropdown:active { transform: scale(0.98); }
        .p-foto { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; margin-right: 10px; border: 1px solid #1A2238; }
        .p-info { text-align: left; }
        .p-name { font-size: 13px; font-weight: bold; color: white; }
        .p-div { font-size: 10px; color: #848999; }
        
        .dropdown-content { display: none; position: absolute; top: 115%; right: 0; background: #0A1124; border: 1px solid #1A2238; border-radius: 12px; width: 180px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); overflow: hidden; text-align: left; }
        .dropdown-content.show { display: block; animation: fadeIn 0.2s ease; }
        .dd-item { padding: 15px; font-size: 13px; color: #848999; border-bottom: 1px solid #1A2238; display: flex; align-items: center; gap: 10px; transition: 0.2s; cursor: pointer; }
        .dd-item:hover { background: #12182B; color: white; }
        .dd-item:last-child { border-bottom: none; }
        .dd-item.logout { color: #FF4B4B; }
        .dd-item.logout:hover { background: rgba(255, 75, 75, 0.1); color: #FF4B4B; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MODAL UPLOAD FOTO DRIVE --- */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal.show { display: flex; animation: fadeInModal 0.3s ease; }
        .modal-content { background: #0A1124; border: 1px solid #1A2238; padding: 30px; border-radius: 20px; width: 90%; max-width: 350px; text-align: left; box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .modal-header { font-size: 16px; font-weight: bold; color: white; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { cursor: pointer; color: #848999; transition: 0.2s; }
        .modal-close:hover { color: white; }
        /* Style input file biar cakep */
        input[type="file"] { width: 100%; padding: 15px; border-radius: 10px; border: 1px dashed #2196F3; background: #12182B; color: white; font-size: 12px; outline: none; margin-bottom: 20px; cursor: pointer; }
        input[type="file"]::file-selector-button { background: #1565C0; color: white; border: none; padding: 8px 15px; border-radius: 8px; margin-right: 15px; cursor: pointer; font-weight: bold; }
        
        .modal-btn { width: 100%; padding: 15px; background: #1565C0; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .modal-btn:hover { background: #1976D2; }
        .modal-btn:disabled { background: #333; cursor: not-allowed; }
        @keyframes fadeInModal { from { opacity: 0; } to { opacity: 1; } }

        /* Jam & Main Area */
        #clock { font-size: 50px; font-weight: bold; margin-bottom: 5px; }
        #date { font-size: 12px; color: #848999; background: #12182B; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 40px; }
        .circle-btn { width: 180px; height: 180px; border-radius: 50%; background: #1565C0; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 40px; cursor: pointer; box-shadow: 0 0 30px rgba(21, 101, 192, 0.5); border: none; transition: 0.3s; color: white; }
        .circle-btn:disabled { background: #333; box-shadow: none; cursor: not-allowed; }
        .circle-btn:active:not(:disabled) { transform: scale(0.95); }
        .circle-btn h1 { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .circle-btn p { font-size: 11px; color: #BBDEFB; }
        .card { background: #0A1124; border-radius: 20px; padding: 25px; text-align: left; border: 1px solid #1A2238; margin-bottom: 20px; }
        .card-header { font-size: 11px; color: #848999; margin-bottom: 20px; font-weight: bold; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stat-main { font-size: 28px; font-weight: bold; }
        .stat-sub { font-size: 11px; color: #848999; font-style: italic; }
        .status-pill { background: #12182B; padding: 10px 20px; border-radius: 10px; text-align: center; border: 1px solid #1A2238; }
        .status-pill span { font-size: 10px; color: #848999; display: block; margin-bottom: 2px; }
        .status-pill b { font-size: 14px; color: #2196F3; }
        .target-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px solid #1A2238; font-size: 13px; }
        .target-label { color: #848999; }
        .target-time { font-weight: bold; color: white; }
        .loader { display: none; width: 25px; height: 25px; border: 3px solid #ffffff33; border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="app">
    
    <div class="top-bar">
        <div class="profile-dropdown" onclick="toggleMenu()">
            <img id="p-foto" src="https://ui-avatars.com/api/?name=User&background=333&color=fff&bold=true" class="p-foto" alt="Profile">
            <div class="p-info">
                <div class="p-name" id="p-nama">Loading...</div>
                <div class="p-div" id="p-divisi">Karyawan</div>
            </div>
            <i class="fas fa-chevron-down" style="color: #848999; margin-left: 12px; font-size: 12px;"></i>
            
            <div class="dropdown-content" id="dd-menu">
                <div class="dd-item" onclick="openPhotoModal()">
                    <i class="fas fa-camera" style="color: #2196F3;"></i> Upload Foto ke Drive
                </div>
                <div class="dd-item logout" onclick="doLogout()">
                    <i class="fas fa-sign-out-alt"></i> Log Out (Keluar)
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="photo-modal">
        <div class="modal-content">
            <div class="modal-header">
                Pilih Foto dari Galeri
                <i class="fas fa-times modal-close" onclick="closePhotoModal()"></i>
            </div>
            <input type="file" id="photo-upload" accept="image/*">
            <p style="font-size: 11px; color: #848999; font-style: italic; margin-bottom: 20px;">*Foto akan diupload ke Google Drive. Maksimal ukuran 2MB.</p>
            <button id="btn-save-photo" class="modal-btn" onclick="uploadToDrive()">UPLOAD & SIMPAN</button>
        </div>
    </div>

    <div id="clock">00:00:00</div>
    <div id="date">MEMUAT...</div>

    <button id="btn-absen" class="circle-btn" onclick="doAbsen()" disabled>
        <div id="loader" class="loader"></div>
        <div id="btn-content">
            <h1 id="txt-action">DATANG</h1>
            <p>KLIK UNTUK ABSEN</p>
        </div>
    </button>

    <div class="card">
        <div class="card-header">PELEM 5 MONITORING</div>
        <div class="stat-row">
            <div>
                <div class="stat-main" id="u-akumulasi">0 Hari</div>
                <div class="stat-sub">*Total Masuk Bulan Ini</div>
            </div>
            <div class="status-pill">
                <span>STATUS:</span>
                <b id="u-status-hari-ini">SINKRON...</b>
            </div>
        </div>
        <div class="target-row" style="margin-top: 20px;">
            <span class="target-label">Target Masuk</span>
            <span class="target-time" id="t-m">--:--</span>
        </div>
        <div class="target-row">
            <span class="target-label">Target Pulang</span>
            <span class="target-time" id="t-p">--:--</span>
        </div>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbwHn6QDyZluAHqMmDPxnZIi5jU4x204fc3Ck-5eDVEsk70cKTLxskfMjWty3sZfP6oF/exec"; 
    const KANTOR = { lat: -7.86765090281387, lng: 112.01944788836946, rad: 150 }; 
    
    let user = JSON.parse(localStorage.getItem('user_pelem_5'));
    let statusHarian = "DATANG";

    function updateClock() {
        const now = new Date();
        document.getElementById('clock').innerText = now.getHours().toString().padStart(2, '0') + "." + now.getMinutes().toString().padStart(2, '0') + "." + now.getSeconds().toString().padStart(2, '0');
        document.getElementById('date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
    }
    setInterval(updateClock, 1000); updateClock();

    window.onload = async () => {
        if(!user) return window.location.href = "login.html"; 
        
        document.getElementById('p-nama').innerText = user.nama || "User";
        document.getElementById('p-divisi').innerText = user.divisi || "Karyawan";
        
        if(user.foto && user.foto.includes("http")) {
            document.getElementById('p-foto').src = user.foto;
        } else {
            document.getElementById('p-foto').src = `https://ui-avatars.com/api/?name=${user.nama}&background=1565C0&color=fff&bold=true`;
        }
        
        document.getElementById('t-m').innerText = user.jamMasuk || "--:--";
        document.getElementById('t-p').innerText = user.jamPulang || "--:--";
        syncStatus();
    };

    // --- LOGIC UPLOAD KE DRIVE ---
    function openPhotoModal() {
        document.getElementById('photo-modal').classList.add('show');
    }

    function closePhotoModal() {
        document.getElementById('photo-modal').classList.remove('show');
        document.getElementById('dd-menu').classList.remove('show');
        document.getElementById('photo-upload').value = ""; // Reset input
    }

    async function uploadToDrive() {
        const fileInput = document.getElementById('photo-upload');
        const btnSave = document.getElementById('btn-save-photo');

        if(fileInput.files.length === 0) return alert("⚠️ Pilih foto dari galeri dulu, Bro!");
        
        const file = fileInput.files[0];
        
        // Batasi ukuran max 2.5MB biar gak timeout pas upload
        if(file.size > 2.5 * 1024 * 1024) return alert("⚠️ Ukuran foto maksimal 2.5 MB! Pilih yang lebih kecil.");

        btnSave.disabled = true;
        btnSave.innerText = "UPLOADING KE DRIVE...";

        // Baca file gambar dan jadikan Base64
        const reader = new FileReader();
        reader.onload = async function(e) {
            // Ambil string Base64 murni (buang header data:image/png;base64,)
            const base64Data = e.target.result.split(',')[1]; 

            try {
                const r = await fetch(scriptURL, { 
                    method: 'POST', 
                    body: JSON.stringify({ 
                        action: "updatePhoto", 
                        id: user.id, 
                        nama: user.nama, 
                        base64: base64Data,
                        mimeType: file.type,
                        filename: file.name
                    })
                });
                const res = await r.json();
                
                if(res.result === "success") {
                    user.foto = res.newPhotoUrl;
                    localStorage.setItem('user_pelem_5', JSON.stringify(user));
                    document.getElementById('p-foto').src = res.newPhotoUrl;
                    alert("✅ MANTAP! Foto berhasil diupload ke Drive Kantor.");
                    closePhotoModal();
                } else {
                    alert("❌ Gagal Menyimpan: " + res.message);
                }
            } catch(e) {
                alert("❌ Koneksi Gagal atau Timeout. Coba foto ukuran lebih kecil.");
            } finally {
                btnSave.disabled = false;
                btnSave.innerText = "UPLOAD & SIMPAN";
            }
        };
        // Mulai proses baca file
        reader.readAsDataURL(file);
    }

    // --- LOGIC DROPDOWN & LOGOUT ---
    function toggleMenu() { document.getElementById('dd-menu').classList.toggle('show'); }
    window.onclick = function(event) {
        if (!event.target.closest('.profile-dropdown') && !event.target.closest('.modal-content')) {
            const dds = document.getElementsByClassName("dropdown-content");
            for (let i = 0; i < dds.length; i++) { dds[i].classList.remove('show'); }
        }
    }
    function doLogout() {
        if(confirm("Yakin ingin Keluar (Log Out)?")) {
            localStorage.removeItem('user_pelem_5');
            window.location.href = "login.html";
        }
    }

    // --- LOGIC MESIN ABSEN ---
    async function syncStatus() {
        try {
            const r = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "login", id: user.id, pin: "RECHECK" })});
            const d = await r.json();
            statusHarian = d.statusHariIni;
            document.getElementById('u-akumulasi').innerText = `${d.totalAkumulasi || 0} Hari`;
            updateUI();
        } catch (e) { document.getElementById('u-status-hari-ini').innerText = "OFFLINE"; }
    }

    function updateUI() {
        const btn = document.getElementById('btn-absen'); const txt = document.getElementById('txt-action'); const pill = document.getElementById('u-status-hari-ini');
        btn.disabled = false;
        if(statusHarian === "SELESAI"){
            btn.disabled = true; txt.innerText = "DONE"; btn.style.background = "#333"; btn.style.boxShadow = "none";
            pill.innerText = "BERES ✓"; pill.style.color = "#848999";
        } else if(statusHarian === "PULANG"){
            txt.innerText = "PULANG"; btn.style.background = "#F57C00"; btn.style.boxShadow = "0 0 30px rgba(245, 124, 0, 0.5)";
            pill.innerText = "SDH MASUK"; pill.style.color = "#F57C00";
        } else {
            txt.innerText = "DATANG"; btn.style.background = "#1565C0"; btn.style.boxShadow = "0 0 30px rgba(21, 101, 192, 0.5)";
            pill.innerText = "NORMAL"; pill.style.color = "#2196F3";
        }
    }

    function doAbsen() {
        setLoading(true);
        navigator.geolocation.getCurrentPosition(async (p) => {
            const d = dist(p.coords.latitude, p.coords.longitude, KANTOR.lat, KANTOR.lng);
            if(d > KANTOR.rad) { alert(`KEJAUHAN BRO!\nJarak: ${Math.round(d)}m. Max: 150m.`); setLoading(false); return; }
            try {
                const r = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: statusHarian, id: user.id, nama: user.nama, lat: p.coords.latitude, lng: p.coords.longitude })});
                const res = await r.json();
                if(res.result === "success") {
                    const jamNow = new Date().getHours().toString().padStart(2,'0') + ":" + new Date().getMinutes().toString().padStart(2,'0');
                    if(statusHarian === "DATANG" && jamNow > user.jamMasuk) alert(`⚠️ TELAT LU!\nTarget: ${user.jamMasuk}\nAbsen: ${jamNow}`);
                    else alert("✅ BERHASIL!");
                    location.reload();
                }
            } catch(e) { alert("Error Server!"); setLoading(false); }
        }, (e) => { alert("GPS Mati!"); setLoading(false); }, { enableHighAccuracy: true });
    }

    function setLoading(s) {
        document.getElementById('loader').style.display = s ? "block" : "none";
        document.getElementById('btn-content').style.display = s ? "none" : "block";
        document.getElementById('btn-absen').disabled = s;
    }
    function dist(l1, n1, l2, n2) {
        const R = 6371e3; const dL = (l2-l1)*Math.PI/180; const dN = (n2-n1)*Math.PI/180;
        const a = Math.sin(dL/2)*Math.sin(dL/2) + Math.cos(l1*Math.PI/180)*Math.cos(l2*Math.PI/180)*Math.sin(dN/2)*Math.sin(dN/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }
</script>
</body>
</html>
