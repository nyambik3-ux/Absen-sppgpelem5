<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard Absensi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #04091A; color: white; display: flex; justify-content: center; min-height: 100vh; padding: 20px 0; }
        .app { width: 90%; max-width: 400px; text-align: center; position: relative; }
        .top-bar { display: flex; justify-content: flex-end; margin-bottom: 30px; position: relative; z-index: 50; }
        .profile-dropdown { display: flex; align-items: center; background: #0A1124; border: 1px solid #1A2238; border-radius: 15px; padding: 8px 15px; cursor: pointer; transition: 0.2s; user-select: none; }
        .profile-dropdown:active { transform: scale(0.98); }
        .profile-dropdown img { width: 35px; height: 35px; border-radius: 50%; margin-right: 10px; object-fit: cover; border: 2px solid #2196F3; }
        .profile-info { text-align: left; }
        .profile-name { font-weight: bold; font-size: 14px; }
        .profile-role { font-size: 11px; color: #aaa; }
        .dropdown-menu { display: none; position: absolute; top: 60px; right: 0; background: #0A1124; border: 1px solid #1A2238; border-radius: 10px; width: 150px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .dropdown-menu button { width: 100%; padding: 12px; background: transparent; border: none; color: #ff4d4d; font-weight: bold; cursor: pointer; border-bottom: 1px solid #1A2238; }
        .time-display { font-size: 40px; font-weight: bold; margin-bottom: 5px; color: #2196F3; }
        .date-display { font-size: 14px; color: #aaa; margin-bottom: 40px; }
        .card { background: #0A1124; border: 1px solid #1A2238; border-radius: 20px; padding: 25px; margin-bottom: 20px; text-align: left; }
        .card-title { font-size: 12px; color: #888; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 14px; }
        .info-label { color: #888; }
        .info-val { font-weight: bold; }
        .btn-absen { width: 100%; padding: 18px; border-radius: 15px; border: none; font-size: 16px; font-weight: bold; color: white; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-datang { background: #4CAF50; box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3); }
        .btn-pulang { background: #f44336; box-shadow: 0 4px 15px rgba(244, 67, 54, 0.3); }
        .loader { display: none; width: 40px; height: 40px; border: 4px solid #1A2238; border-top: 4px solid #2196F3; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app">
    <div class="top-bar">
        <div class="profile-dropdown" onclick="toggleMenu()">
            <img id="u-foto" src="https://via.placeholder.com/150" alt="Foto">
            <div class="profile-info">
                <div id="u-nama" class="profile-name">-</div>
                <div id="u-div" class="profile-role">-</div>
            </div>
            <i class="fas fa-chevron-down" style="margin-left: 10px; font-size: 12px; color:#888"></i>
        </div>
        <div class="dropdown-menu" id="d-menu"><button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Keluar</button></div>
    </div>

    <div id="jam" class="time-display">--:--</div>
    <div id="tgl" class="date-display">--</div>

    <div class="card">
        <div class="card-title"><i class="fas fa-clock"></i> Jadwal Hari Ini</div>
        <div class="info-row"><span class="info-label">Jam Masuk</span><span class="info-val" id="j-masuk">--:--</span></div>
        <div class="info-row"><span class="info-label">Jam Pulang</span><span class="info-val" id="j-pulang">--:--</span></div>
    </div>

    <div class="card">
        <div class="card-title"><i class="fas fa-map-marker-alt"></i> Lokasi GPS</div>
        <div class="info-row"><span class="info-label">Status</span><span class="info-val" id="l-status" style="color:#FFC107">Mencari...</span></div>
        <div class="info-row"><span class="info-label">Jarak Target</span><span class="info-val" id="l-jarak">-</span></div>
    </div>

    <div class="loader" id="loader"></div>
    <button id="btn-absen" class="btn-absen btn-datang" onclick="doAbsen()" disabled>TUNGGU LOKASI...</button>
</div>

<script>
    // ⚠️ JANGAN LUPA: Masukkan URL Script Google lu di sini
    const scriptURL = "MASUKAN_URL_SCRIPT_GOOGLE_DISINI_YANG_TERBARU"; 
    
    // Cek Login
    const userData = localStorage.getItem('user_pelem_5');
    if (!userData) window.location.href = "login.html";
    const user = JSON.parse(userData);
    
    // Nampilin data ke layar
    document.getElementById('u-nama').innerText = user.nama || user.id;
    document.getElementById('u-div').innerText = user.divisi || "Karyawan";
    document.getElementById('u-foto').src = user.foto || "https://via.placeholder.com/150";
    document.getElementById('j-masuk').innerText = user.jamMasuk || "-";
    document.getElementById('j-pulang').innerText = user.jamPulang || "-";

    // ==========================================
    // LOGIKA TIKET (UDAH ANTI LOGOUT)
    // ==========================================
    // Cari tiket berdasarkan ID karyawan yang lagi login (misal: tiket_absen_P-350)
    let tiketMasuk = localStorage.getItem('tiket_absen_' + user.id);
    let statusHarian = tiketMasuk ? "PULANG" : "DATANG"; 
    
    const btnAbsen = document.getElementById('btn-absen');
    
    function updateTombol() {
        if (statusHarian === "PULANG") {
            btnAbsen.innerText = `ABSEN PULANG (Tgl ${tiketMasuk})`; 
            btnAbsen.className = "btn-absen btn-pulang";
        } else {
            btnAbsen.innerText = "ABSEN MASUK";
            btnAbsen.className = "btn-absen btn-datang";
        }
    }
    updateTombol();

    // Jam Realtime
    setInterval(() => {
        const now = new Date();
        document.getElementById('jam').innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        document.getElementById('tgl').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }, 1000);

    // ==========================================
    // GPS & LOKASI
    // ==========================================
    // ⚠️ JANGAN LUPA: Ganti koordinat GPS ini sama lokasi tempat lu
    let locTarget = { lat: -7.801389, lng: 110.364444 }; 
    let currentLat = 0, currentLng = 0, isLocReady = false;

    function getDistance(lat1, lon1, lat2, lon2) {
        const p = Math.PI/180;
        const a = 0.5 - Math.cos((lat2 - lat1) * p)/2 + Math.cos(lat1 * p) * Math.cos(lat2 * p) * (1 - Math.cos((lon2 - lon1) * p))/2;
        return Math.floor(12742e3 * Math.asin(Math.sqrt(a)));
    }

    navigator.geolocation.watchPosition(
        (pos) => {
            currentLat = pos.coords.latitude; currentLng = pos.coords.longitude;
            const jarak = getDistance(currentLat, currentLng, locTarget.lat, locTarget.lng);
            document.getElementById('l-status').innerText = "Akurat";
            document.getElementById('l-status').style.color = "#4CAF50";
            document.getElementById('l-jarak').innerText = jarak + " meter";
            isLocReady = true; btnAbsen.disabled = false;
        },
        (err) => {
            document.getElementById('l-status').innerText = "GPS Ditolak";
            document.getElementById('l-status').style.color = "#f44336";
            btnAbsen.disabled = true; btnAbsen.innerText = "IZINKAN GPS";
        }, { enableHighAccuracy: true }
    );

    // ==========================================
    // EKSEKUSI ABSEN
    // ==========================================
    async function doAbsen() {
        if (!isLocReady) return alert("Tunggu sampai GPS akurat!");
        if (getDistance(currentLat, currentLng, locTarget.lat, locTarget.lng) > 150) return alert("⚠️ KEJAUHAN! Max radius 150m.");

        btnAbsen.style.display = "none"; document.getElementById('loader').style.display = "block";

        try {
            const reqBody = {
                action: statusHarian,
                id: user.id,
                nama: user.nama || user.id,
                lat: currentLat, lng: currentLng,
                tiketTgl: tiketMasuk 
            };

            const resObj = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(reqBody) });
            const res = await resObj.json();

            if (res.result === "success") {
                if (statusHarian === "DATANG") {
                    // Berhasil datang? Simpan tiket pakai ID Karyawan
                    localStorage.setItem('tiket_absen_' + user.id, new Date().getDate());
                    
                    const jamNow = new Date().getHours().toString().padStart(2,'0') + ":" + new Date().getMinutes().toString().padStart(2,'0');
                    if (user.jamMasuk && jamNow > user.jamMasuk) alert(`⚠️ TELAT LU!\nTarget: ${user.jamMasuk}\nAbsen: ${jamNow}`);
                    else alert("✅ ABSEN MASUK BERHASIL!");
                } else {
                    // Berhasil pulang? Buang tiket milik karyawan ini
                    localStorage.removeItem('tiket_absen_' + user.id);
                    alert("✅ ABSEN PULANG BERHASIL!");
                }
                window.location.reload();
            } else {
                alert("GAGAL: " + res.result);
                resetTombol();
            }
        } catch (err) {
            alert("ERROR KONEKSI: Cek Internet!");
            resetTombol();
        }
    }

    function resetTombol() { btnAbsen.style.display = "block"; document.getElementById('loader').style.display = "none"; }
    function toggleMenu() { const m = document.getElementById('d-menu'); m.style.display = m.style.display === 'block' ? 'none' : 'block'; }
    
    // ==========================================
    // LOGOUT AMAN (Nggak Hapus Tiket)
    // ==========================================
    function logout() { 
        localStorage.removeItem('user_pelem_5'); // Cuma hapus sesi login
        // TIKET ABSEN TETAP AMAN TIDAK DIHAPUS DI SINI
        window.location.href = "login.html"; 
    }
</script>
</body>
</html>
