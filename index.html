<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPPG PELEM 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { background: #0f172a; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; margin:0; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; }
        .btn-grad { background: linear-gradient(135deg, #3b82f6, #1d4ed8); transition: 0.2s; }
        #avatar-box { background-position: center; background-size: cover; }
    </style>
</head>
<body>

    <div id="login-page" class="glass p-10 w-full max-w-sm text-center shadow-2xl">
        <div class="w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <i class="fas fa-fingerprint text-4xl"></i>
        </div>
        <h1 class="text-2xl font-black mb-8 italic uppercase tracking-widest">Pelem 5</h1>
        <div class="space-y-4">
            <input type="text" id="user-id" placeholder="ID KARYAWAN" class="w-full bg-slate-900/50 p-4 rounded-xl border border-white/5 text-center font-bold">
            <input type="password" id="user-pin" placeholder="PIN" class="w-full bg-slate-900/50 p-4 rounded-xl border border-white/5 text-center font-bold tracking-widest">
            <button onclick="handleLogin()" id="btn-login" class="btn-grad w-full py-4 rounded-xl font-black uppercase tracking-widest">Masuk</button>
        </div>
    </div>

    <div id="main-page" class="hidden w-full max-w-md space-y-4">
        <div class="glass p-5 flex items-center gap-4">
            <div id="avatar-box" class="relative w-16 h-16 rounded-2xl bg-slate-800 flex items-center justify-center text-2xl font-black overflow-hidden shadow-inner">
                <span id="avatar-txt">--</span>
                <label class="absolute inset-0 bg-black/40 flex items-center justify-center cursor-pointer opacity-0 hover:opacity-100 transition-all">
                    <i class="fas fa-camera text-white text-sm"></i>
                    <input type="file" id="input-profil" class="hidden" accept="image/*" onchange="uploadFotoProfil(this)">
                </label>
            </div>
            <div class="flex-1">
                <h2 id="display-name" class="text-lg font-bold italic">...</h2>
                <p id="display-divisi" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Memuat...</p>
            </div>
        </div>

        <div class="glass p-6 text-center">
            <div id="clock" class="text-5xl font-black tracking-widest mb-1">00:00:00</div>
            <div id="dist-info" class="text-[10px] font-bold text-slate-500 uppercase italic">GPS LOADING...</div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="takeAbsen('DATANG')" class="bg-emerald-600 p-5 rounded-[24px] font-black flex flex-col items-center gap-2 active:scale-95">
                <i class="fas fa-sign-in-alt text-xl"></i><span class="text-xs">MASUK</span>
            </button>
            <button onclick="takeAbsen('PULANG')" class="bg-rose-600 p-5 rounded-[24px] font-black flex flex-col items-center gap-2 active:scale-95">
                <i class="fas fa-sign-out-alt text-xl"></i><span class="text-xs">PULANG</span>
            </button>
        </div>

        <div class="glass p-4 space-y-3">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest text-center italic">Izin / Sakit</p>
            <select id="izin-kat" class="w-full bg-slate-900/50 p-3 rounded-xl text-xs font-bold text-white outline-none">
                <option value="SAKIT">SAKIT</option>
                <option value="IZIN">IZIN</option>
            </select>
            <textarea id="izin-alasan" placeholder="Alasan..." class="w-full bg-slate-900/50 p-3 rounded-xl text-xs h-20 outline-none text-white"></textarea>
            <div class="flex gap-2">
                <button onclick="document.getElementById('input-izin').click()" class="flex-1 bg-slate-700 p-3 rounded-xl text-[10px] font-bold uppercase">Bukti Foto</button>
                <button onclick="submitIzin()" id="btn-izin" class="flex-1 bg-orange-600 p-3 rounded-xl text-[10px] font-bold uppercase">Kirim</button>
            </div>
            <input type="file" id="input-izin" class="hidden" accept="image/*" onchange="previewIzin(this)">
            <p id="izin-status" class="text-[9px] text-center text-emerald-400 hidden italic">✓ Foto Terlampir</p>
        </div>

        <button onclick="location.reload()" class="w-full py-4 text-[9px] text-slate-600 font-bold uppercase italic">Logout</button>
    </div>

    <script>
        // GANTI INI DENGAN URL APPS SCRIPT .exec TERBARU
        const API_URL = "https://script.google.com/macros/s/AKfycbz5g252kVBbAU4e3Xn4psfhhXA6m9TxAirWHx4TzC9lJbVCKw2omWpaG7pu_21L37Cr/exec";
        let user = null;
        let base64Izin = null;

        setInterval(() => {
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = new Date().toLocaleTimeString('id-ID', {hour12:false});
        }, 1000);

        setInterval(() => {
            navigator.geolocation.getCurrentPosition(p => {
                const dist = calculateDistance(p.coords.latitude, p.coords.longitude, -7.749941, 112.174396);
                const info = document.getElementById('dist-info');
                if(info) {
                    info.innerText = `Jarak: ${Math.round(dist)}m dari Lokasi`;
                    info.className = dist > 100 ? "text-[10px] text-rose-500 font-black animate-pulse" : "text-[10px] text-emerald-500 font-black";
                }
            }, null, {enableHighAccuracy:true});
        }, 2000);

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        async function handleLogin() {
            const id = document.getElementById('user-id').value;
            const pin = document.getElementById('user-pin').value;
            const btn = document.getElementById('btn-login');
            if(!id || !pin) return alert("Isi ID & PIN!");
            btn.innerText = "MENGECEK..."; btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "login", id: id, pin: pin })
                });
                const d = await response.json();
                if(d.result === 'success') {
                    user = d.user;
                    document.getElementById('login-page').classList.add('hidden');
                    document.getElementById('main-page').classList.remove('hidden');
                    document.getElementById('display-name').innerText = user.nama;
                    document.getElementById('display-divisi').innerText = user.divisi;
                    setAvatar(user.foto, user.nama);
                } else { alert(d.message); }
            } catch(e) { alert("Error: Pastikan URL API Benar!"); }
            finally { btn.innerText = "Masuk"; btn.disabled = false; }
        }

        function setAvatar(url, nama) {
            const box = document.getElementById('avatar-box');
            const txt = document.getElementById('avatar-txt');
            if(url && url.startsWith('http')) { box.style.backgroundImage = `url('${url}')`; txt.innerText = ""; }
            else { box.style.backgroundImage = "none"; txt.innerText = nama.substring(0,2).toUpperCase(); }
        }

        async function uploadFotoProfil(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = async (e) => {
                const b64 = e.target.result.split(',')[1];
                try {
                    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "update_foto_drive", id: user.id, base64Data: b64 }) });
                    const d = await res.json();
                    if(d.result === 'success') { setAvatar(d.url, user.nama); alert("Profil Diupdate!"); }
                } catch(err) { alert("Gagal!"); }
            };
        }

        function previewIzin(input) {
            if (!input.files[0]) return;
            const reader = new FileReader();
            reader.readAsDataURL(input.files[0]);
            reader.onload = (e) => { base64Izin = e.target.result.split(',')[1]; document.getElementById('izin-status').classList.remove('hidden'); };
        }

        async function submitIzin() {
            if(!base64Izin) return alert("Pilih Foto Bukti!");
            const btn = document.getElementById('btn-izin');
            btn.innerText = "KIRIM..."; btn.disabled = true;
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "upload_izin", id: user.id, nama: user.nama, keterangan: document.getElementById('izin-alasan').value, base64Data: base64Izin }) });
                const d = await res.json();
                if(d.result === 'success') { alert("Berhasil!"); location.reload(); }
            } catch(e) { alert("Gagal!"); }
            finally { btn.innerText = "Kirim"; btn.disabled = false; }
        }

        async function takeAbsen(tipe) {
            navigator.geolocation.getCurrentPosition(async p => {
                try {
                    const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: tipe, id: user.id, nama: user.nama, lat: p.coords.latitude, lng: p.coords.longitude }) });
                    const d = await r.json();
                    alert(d.message); if(d.result === 'success') location.reload();
                } catch(e) { alert("Server Error!"); }
            }, () => alert("Aktifkan GPS!"));
        }
    </script>
</body>
</html>
