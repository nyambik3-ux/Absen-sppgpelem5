<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Pelem 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
    </style>
</head>
<body class="p-4 min-h-screen flex flex-col items-center">

    <div class="w-full max-w-md flex flex-col gap-6">
        <div class="bg-slate-900 border border-slate-800 p-5 rounded-3xl flex items-center gap-4">
            <div class="w-14 h-14 rounded-xl bg-blue-600 flex items-center justify-center text-2xl font-black" id="initials">--</div>
            <div>
                <h1 id="display-name" class="font-bold text-lg">Siap Kerja?</h1>
                <p id="display-divisi" class="text-blue-400 text-xs font-bold uppercase tracking-widest">Silahkan Login</p>
            </div>
        </div>

        <div class="text-center py-6">
            <div id="live-clock" class="text-6xl font-black tabular-nums">00:00:00</div>
            <div id="live-date" class="text-slate-500 text-sm mt-2">Memuat Tanggal...</div>
        </div>

        <div class="flex justify-center">
            <button id="main-btn" onclick="handleAction()" class="w-52 h-52 rounded-full bg-blue-600 border-[12px] border-slate-900 shadow-2xl text-2xl font-black hover:scale-95 transition-all">
                LOGIN
            </button>
        </div>

        <div class="bg-slate-900/50 border border-slate-800 p-4 rounded-2xl flex justify-between items-center text-xs font-bold">
            <span id="location-text" class="text-slate-500">CEK LOKASI...</span>
            <span id="distance-meter" class="bg-slate-800 px-2 py-1 rounded">0 m</span>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwYG_DGgpuY27RHI15Ny6x4KxhzpOWYYlNYJptjNo255FoyYORqkwnfvuxKs3I4ctt3/exec";
        const TARGET_COORDS = { lat: -7.749894307797291, lng: 112.1744187592495 };
        const MAX_DISTANCE = 100;

        let userData = JSON.parse(localStorage.getItem('pelem5_user')) || null;
        let isInside = false;

        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').innerText = now.toLocaleTimeString('id-ID', { hour12: false });
            document.getElementById('live-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
        }
        setInterval(updateClock, 1000);
        updateClock();

        function checkLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, TARGET_COORDS.lat, TARGET_COORDS.lng);
                    isInside = dist <= MAX_DISTANCE;
                    document.getElementById('distance-meter').innerText = `± ${Math.round(dist)} m`;
                    const txt = document.getElementById('location-text');
                    if(isInside) {
                        txt.innerText = "AREA PELEM 5";
                        txt.className = "text-emerald-400";
                    } else {
                        txt.innerText = "DILUAR JANGKAUAN";
                        txt.className = "text-rose-500";
                    }
                }, null, { enableHighAccuracy: true });
            }
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function updateUI() {
            if (!userData) return;
            document.getElementById('display-name').innerText = userData.nama;
            document.getElementById('display-divisi').innerText = userData.divisi;
            document.getElementById('initials').innerText = userData.nama.substring(0,2).toUpperCase();
            document.getElementById('main-btn').innerText = "DATANG";
        }

        async function handleAction() {
            if (!userData) {
                const id = prompt("Masukkan ID Karyawan:");
                const pin = prompt("Masukkan PIN:");
                if(!id || !pin) return;
                try {
                    const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', id, pin }) });
                    const d = await r.json();
                    if(d.result === 'success') {
                        userData = d.user;
                        localStorage.setItem('pelem5_user', JSON.stringify(userData));
                        updateUI();
                    } else { alert(d.message); }
                } catch(e) { alert("Gagal koneksi ke server!"); }
                return;
            }

            if (!isInside) return alert("Anda harus berada di lokasi!");
            
            const action = document.getElementById('main-btn').innerText;
            try {
                const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action, id: userData.id, nama: userData.nama, lat: 0, lng: 0 }) });
                const d = await r.json();
                alert(d.message);
                if(d.result === 'success' && action === 'PULANG') { localStorage.clear(); location.reload(); }
                else if(d.result === 'success') { document.getElementById('main-btn').innerText = "PULANG"; }
            } catch(e) { alert("Error saat absen!"); }
        }

        updateUI();
        checkLocation();
    </script>
</body>
</html>
