<div id="main-page" class="hidden w-full max-w-[450px] space-y-4">
    
    <div class="glass-card p-5 border-l-4 border-blue-500">
        <h2 id="display-name" class="text-xl font-extrabold">...</h2>
        <div class="flex justify-between items-center mt-2">
            <span id="display-divisi" class="text-xs text-slate-400">Divisi ...</span>
            <span class="px-2 py-1 bg-blue-500/20 text-blue-400 text-[10px] font-bold rounded italic">SHIFT: 08:00 - 16:00</span>
        </div>
    </div>

    <div class="glass-card p-6 text-center">
        <div id="clock" class="text-5xl font-black tracking-tight mb-1">00:00:00</div>
        <p class="text-[10px] text-slate-500 uppercase tracking-widest">Waktu Presensi Pelem 5</p>
    </div>

    <div id="feedback-panel" class="hidden glass-card p-4 border border-yellow-500/50 bg-yellow-500/5 animate-pulse">
        <p class="text-xs text-slate-400 uppercase font-bold">Laporan Terakhir:</p>
        <div id="atensi-result" class="text-lg font-bold mt-1 text-yellow-500">...</div>
        <div id="durasi-result" class="text-xs text-emerald-400 mt-1"></div>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button onclick="takeAbsen('DATANG')" class="bg-emerald-600 p-5 rounded-2xl font-bold hover:bg-emerald-500 active:scale-95 transition-all">
            <i class="fas fa-sign-in-alt mb-2 text-xl"></i><br>DATANG
        </button>
        <button onclick="takeAbsen('PULANG')" class="bg-orange-600 p-5 rounded-2xl font-bold hover:bg-orange-500 active:scale-95 transition-all">
            <i class="fas fa-sign-out-alt mb-2 text-xl"></i><br>PULANG
        </button>
    </div>
</div>

<script>
// Logic JavaScript takeAbsen yang diperbarui untuk koordinat & atensi
async function takeAbsen(tipe) {
    if(!navigator.geolocation) return alert("GPS tidak didukung!");
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const payload = {
            action: tipe,
            id: currentUser.id,
            nama: currentUser.nama,
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const out = await res.json();
            
            // Tampilkan ke UI
            document.getElementById('feedback-panel').classList.remove('hidden');
            document.getElementById('atensi-result').innerText = out.message;
            if(tipe === 'PULANG') document.getElementById('durasi-result').innerText = "Total Kerja: " + out.durasi;
            
            alert("Sistem: " + out.message);
        } catch (e) { alert("Gagal kirim data!"); }
    });
}
</script>
