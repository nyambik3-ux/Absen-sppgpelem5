<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login Pelem 5</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #04091A; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #0A1124; padding: 40px 30px; border-radius: 20px; border: 1px solid #1A2238; width: 90%; max-width: 350px; text-align: center; }
        h2 { margin-bottom: 25px; color: #2196F3; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #1A2238; background: #12182B; color: white; outline: none; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #1565C0; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:disabled { background: #333; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>LOGIN KARYAWAN</h2>
    <input type="number" id="id" placeholder="Masukkan ID">
    <input type="password" id="pin" placeholder="Masukkan PIN">
    <button id="btn" onclick="doLogin()">MASUK</button>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzrrQ510rB9niFNcs9_8eucQXIRVgJU9lsUOp_BgTaFoOs_Vr55XkVThndWb5qD9cRS/exec"; 
    
    async function doLogin() {
        const id = document.getElementById('id').value;
        const pin = document.getElementById('pin').value;
        const btn = document.getElementById('btn');

        if(!id || !pin) return alert("Isi ID dan PIN!");
        
        btn.innerText = "MENCOBA MASUK...";
        btn.disabled = true;

        try {
            const r = await fetch(scriptURL, { method: 'POST', body: JSON.stringify({ action: "login", id: id, pin: pin })});
            const res = await r.json();
            
            if(res.result === "success") {
                // INI KUNCI UTAMANYA BIAR GAK RE-LOG TERUS
                localStorage.setItem('user_pelem_5', JSON.stringify(res.user));
                window.location.href = "index.html"; 
            } else {
                alert(res.message || "Gagal Login!");
                btn.innerText = "MASUK"; btn.disabled = false;
            }
        } catch(e) {
            alert("Error Server!");
            btn.innerText = "MASUK"; btn.disabled = false;
        }
    }
</script>

</body>
</html>
