<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk • Smart Presence</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0a0f2a, #030617);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(15, 25, 45, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 30px 60px rgba(168, 85, 247, 0.15);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #a855f7 0%, #3b82f6 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(168, 85, 247, 0.3);
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 18px;
            transition: all 0.2s ease;
        }

        .input-group input {
            width: 100%;
            padding: 16px 20px 16px 54px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            transition: all 0.2s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: #a855f7;
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.25);
        }

        .input-group input::placeholder {
            color: #475569;
        }

        .input-group input:focus + i {
            color: #a855f7;
        }

        .btn-login {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border: none;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 800;
            color: white;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: 0 10px 20px -5px rgba(16, 185, 129, 0.4);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px -3px rgba(16, 185, 129, 0.5);
        }

        .btn-login:active {
            transform: translateY(1px);
        }

        .btn-login:disabled {
            background: #1e293b;
            color: #475569;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            margin-top: 32px;
            color: #475569;
            font-size: 12px;
            font-weight: 500;
        }

        .footer-note i {
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-fingerprint"></i>
            </div>
            <h1>Selamat Datang</h1>
            <div class="subtitle">Absensi Relawan SPPG Pelem 5</div>
        </div>

        <div class="input-group">
            <i class="fas fa-id-card"></i>
            <input type="text" id="id" placeholder="ID Karyawan" autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="pin" placeholder="PIN">
        </div>

        <button class="btn-login" id="btn" onclick="doLogin()">
            <span id="btn-text">MASUK</span>
        </button>

        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> Sistem Absensi Terenkripsi
        </div>
    </div>

    <script>
        // Samakan endpoint URL dengan file index.html Anda
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwYnhOxMBDbMgaFeVl_Pr2_E1ei8eE-rZRrBD_Jv3YJ4p595Pkz-ABLoV3sZAk8GJWfQA/exec";
        
        async function doLogin() {
            const idInput = document.getElementById('id').value.trim();
            const pinInput = document.getElementById('pin').value;
            const btn = document.getElementById('btn');
            const btnText = document.getElementById('btn-text');

            if (!idInput || !pinInput) {
                showToast("Isi ID dan PIN terlebih dahulu!", true);
                return;
            }
            
            // Animasi tombol loading
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> Verifikasi...';

            try {
                const response = await fetch(SCRIPT_URL, { 
                    method: 'POST', 
                    body: JSON.stringify({ action: "login", id: idInput, pin: pinInput })
                });
                const res = await response.json();
                
                if (res.result === "success") {
                    // Simpan ke localStorage untuk penggunaan HP masing-masing
                    localStorage.setItem('user_pelem_5', JSON.stringify(res.user));
                    showToast("Login berhasil! Mengalihkan halaman...", false);
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 800);
                } else {
                    showToast(res.message || "ID atau PIN salah!", true);
                    btn.disabled = false;
                    btnText.innerText = "MASUK";
                }
            } catch(e) {
                showToast("Koneksi error, cek internet Anda.", true);
                btn.disabled = false;
                btnText.innerText = "MASUK";
            }
        }

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%);
                background: ${isError ? '#ea580c' : '#059669'};
                color: white;
                padding: 14px 28px;
                border-radius: 40px;
                font-size: 14px;
                font-weight: 600;
                z-index: 1000;
                animation: slideUp 0.3s ease;
                box-shadow: 0 10px 20px -5px rgba(0,0,0,0.5);
                font-family: 'Inter', sans-serif;
            `;
            toast.innerHTML = `<i class="fas ${isError ? 'fa-exclamation-triangle' : 'fa-check-circle'}"></i> ${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Enter key listener
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') doLogin();
            });
        });
    </script>
</body>
</html>
